[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W"]

ignore = [
  "E501",  # line length
  "E402",
  "E701",
  "E702",
  "E711",
  "E712",
  "E721",
  "E722",
  "E741",
  "F841",
  "F401",
  "W291",
  "W293"
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["F401"]
