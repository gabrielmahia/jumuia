name: Deploy USSD to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - 'webhook_ussd.py'
      - 'services/ussd_service.py'
      - 'services/lectionary.py'
      - 'services/__init__.py'
      - 'requirements-webhook.txt'
      - 'Dockerfile'
      - '.github/workflows/deploy-ussd.yml'

jobs:
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: cnt-ussd
          region: africa-south1
          source: .
          flags: --allow-unauthenticated --memory=256Mi --timeout=10
          env_vars: |
            AFRICASTALKING_USERNAME=sandbox
            WHATSAPP_VERIFY_TOKEN=cps_webhook_2026
            AFRICASTALKING_API_KEY=${{ secrets.AT_API_KEY }}

      - name: Verify deployment
        run: |
          sleep 10
          curl -sf https://cnt-ussd-860570427256.africa-south1.run.app/health \
            && echo "✅ Service healthy" \
            || echo "❌ Health check failed"
