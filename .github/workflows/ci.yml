name: CI — Lint & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest pytest-cov
          pip install streamlit anthropic requests pandas

      - name: Lint with ruff
        run: |
          ruff check services/ tests/ app.py pages/ \
            --ignore E501,E402,E701,E702,E711,E712,E721,E722,E741,F841,F401,W291,W293 \
            --exclude "**/__pycache__"

      - name: Run tests
        env:
          CNT_DB_PATH: /tmp/test_cnt.db
          MPESA_ENV: sandbox
        run: |
          pytest tests/ -v --cov=services --cov-report=term-missing

      - name: Verify app imports
        run: |
          python -c "from services.ai_service import SUPPORTED_LANGUAGES; print('AI service OK')"
          python -c "from services.directory_service import init_db; print('Directory service OK')"
          python -c "from services.mpesa_service import live_activation_checklist; print('M-Pesa service OK')"
          python -c "from services.whatsapp_service import activation_status; print('WhatsApp service OK')"
