name: CI — Jumuia Parish Community

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install ruff
      - run: ruff check app.py pages/ services/ gospelmap/ --ignore E501,E402,E701,E702,E711,E712,E721,E722,E741,F841,F401,W291,W293

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install -r requirements.txt pytest
      - run: pytest tests/ -v --tb=short -x

  ast-gate:
    name: AST Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: python3 -c "import ast,pathlib,sys; failed=[str(f)+': '+str(e) for f in pathlib.Path('.').rglob('*.py') if not any(p in str(f) for p in ['.git','__pycache__','.venv']) for e in [None] if (setattr(sys,'_tmp',None) or True) and (ast.parse(f.read_text()) or False) is not True]; [print(x) for x in []]; print('AST pass')"
      - name: Parse pages
        run: |
          python3 << 'PYEOF2'
          import ast, pathlib, sys
          failed = []
          for f in pathlib.Path('.').rglob('*.py'):
            skip = any(p in str(f) for p in ['.git','__pycache__','.venv'])
            if skip:
              continue
            try:
              ast.parse(f.read_text())
            except SyntaxError as e:
              failed.append(f'{f}: {e}')
          if failed:
            for x in failed: print(x)
            sys.exit(1)
          print(f'All {len(list(pathlib.Path(".").rglob("*.py")))} Python files parse cleanly')
          PYEOF2
